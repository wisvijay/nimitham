<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#2D1A00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D0700;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFE082;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4860A;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>

  <!-- Outer decorative ring -->
  <circle cx="256" cy="256" r="236" fill="none" stroke="#D4860A" stroke-width="2" stroke-dasharray="8 6" opacity="0.6"/>
  <circle cx="256" cy="256" r="220" fill="none" stroke="#D4860A" stroke-width="1" opacity="0.3"/>

  <!-- Sun rays (12 rays for 12 lagnas) -->
  <g transform="translate(256,256)">
    <g opacity="0.85">
      <line x1="0" y1="-195" x2="0" y2="-165" stroke="#FFD54F" stroke-width="3" stroke-linecap="round"/>
      <line x1="0" y1="-195" x2="0" y2="-165" stroke="#FFD54F" stroke-width="3" stroke-linecap="round" transform="rotate(30)"/>
      <line x1="0" y1="-195" x2="0" y2="-165" stroke="#FFD54F" stroke-width="3" stroke-linecap="round" transform="rotate(60)"/>
      <line x1="0" y1="-195" x2="0" y2="-165" stroke="#FFD54F" stroke-width="3" stroke-linecap="round" transform="rotate(90)"/>
      <line x1="0" y1="-195" x2="0" y2="-165" stroke="#FFD54F" stroke-width="3" stroke-linecap="round" transform="rotate(120)"/>
      <line x1="0" y1="-195" x2="0" y2="-165" stroke="#FFD54F" stroke-width="3" stroke-linecap="round" transform="rotate(150)"/>
      <line x1="0" y1="-195" x2="0" y2="-165" stroke="#FFD54F" stroke-width="3" stroke-linecap="round" transform="rotate(180)"/>
      <line x1="0" y1="-195" x2="0" y2="-165" stroke="#FFD54F" stroke-width="3" stroke-linecap="round" transform="rotate(210)"/>
      <line x1="0" y1="-195" x2="0" y2="-165" stroke="#FFD54F" stroke-width="3" stroke-linecap="round" transform="rotate(240)"/>
      <line x1="0" y1="-195" x2="0" y2="-165" stroke="#FFD54F" stroke-width="3" stroke-linecap="round" transform="rotate(270)"/>
      <line x1="0" y1="-195" x2="0" y2="-165" stroke="#FFD54F" stroke-width="3" stroke-linecap="round" transform="rotate(300)"/>
      <line x1="0" y1="-195" x2="0" y2="-165" stroke="#FFD54F" stroke-width="3" stroke-linecap="round" transform="rotate(330)"/>
    </g>
  </g>

  <!-- Central sun circle -->
  <circle cx="256" cy="256" r="148" fill="url(#bgGrad)" stroke="#D4860A" stroke-width="2" opacity="0.95"/>

  <!-- SRM text -->
  <text x="256" y="200"
    font-family="Georgia, serif"
    font-size="68"
    font-weight="bold"
    fill="#D4860A"
    text-anchor="middle"
    letter-spacing="10"
    opacity="0.9">SRM</text>

  <!-- Divider line -->
  <line x1="140" y1="220" x2="372" y2="220" stroke="#D4860A" stroke-width="1.5" opacity="0.5"/>

  <!-- நிமித்தம் Tamil text -->
  <text x="256" y="292"
    font-family="serif"
    font-size="72"
    font-weight="bold"
    fill="#FFD54F"
    text-anchor="middle"
    >நிமித்தம்</text>

  <!-- Subtitle -->
  <text x="256" y="328"
    font-family="Georgia, serif"
    font-size="26"
    fill="#D4860A"
    text-anchor="middle"
    letter-spacing="4"
    opacity="0.8">NIMITHAM</text>

  <!-- Small decorative dots at compass points -->
  <circle cx="256" cy="108" r="4" fill="#D4860A" opacity="0.7"/>
  <circle cx="404" cy="256" r="4" fill="#D4860A" opacity="0.7"/>
  <circle cx="256" cy="404" r="4" fill="#D4860A" opacity="0.7"/>
  <circle cx="108" cy="256" r="4" fill="#D4860A" opacity="0.7"/>
</svg>
